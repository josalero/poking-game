<script>
        function selectCard(element, val) {
            // Clear previous selections
            document.querySelectorAll('.estimation-card').forEach(card => {
                card.classList.remove('border-primary', 'active-card-shadow', 'scale-105', 'bg-primary-fixed');
                card.classList.add('border-surface-container-highest');
            });

            // Set active state
            element.classList.remove('border-surface-container-highest');
            element.classList.add('border-primary', 'active-card-shadow', 'scale-105', 'bg-primary-fixed');
            
            // Show selection display
            const display = document.getElementById('selection-display');
            const valSpan = document.getElementById('selected-val');
            display.classList.remove('hidden');
            valSpan.innerText = val;

            // Haptic feedback simulation
            if ('vibrate' in navigator) {
                navigator.vibrate(10);
            }
        }

        function startCountdown() {
            const container = document.getElementById('countdown-container');
            const timerEl = document.getElementById('timer');
            const startBtn = document.querySelector('#game-controls button');
            
            container.classList.remove('hidden');
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');

            let count = 10;
            timerEl.innerText = count;

            const interval = setInterval(() => {
                count--;
                timerEl.innerText = count;
                
                if (count <= 3) {
                    timerEl.classList.add('text-error');
                    timerEl.classList.add('animate-pulse');
                }

                if (count <= 0) {
                    clearInterval(interval);
                    container.classList.add('hidden');
                    alert("Voting Complete! Revealing cards...");
                    // Reset for demo
                    startBtn.disabled = false;
                    startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    timerEl.classList.remove('text-error', 'animate-pulse');
                }
            }, 1000);
        }

        // Horizontal scroll with wheel support for cards
        const scrollContainer = document.querySelector('.overflow-x-auto');
        scrollContainer.addEventListener('wheel', (evt) => {
            evt.preventDefault();
            scrollContainer.scrollLeft += evt.deltaY;
        });
    </script>
