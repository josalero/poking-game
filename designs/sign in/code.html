<script>
        // Micro-interactions for Avatar Selection
        const avatarOptions = document.querySelectorAll('.avatar-option');
        avatarOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                avatarOptions.forEach(o => o.querySelector('div').classList.remove('ring-4', 'ring-primary', 'border-primary'));
                opt.querySelector('div').classList.add('ring-4', 'ring-primary', 'border-primary');
                
                // Haptic-like visual feedback
                opt.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    opt.style.transform = 'scale(1)';
                }, 100);
            });
        });

        // Form Submission Animation
        document.getElementById('registrationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Entering Room...</span>
            `;

            // Simulate navigation delay
            setTimeout(() => {
                alert('Welcome to the Sprint Planning session!');
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }, 1500);
        });

        // Subtle parallax mouse effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelectorAll('.animate-float').forEach(el => {
                el.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
